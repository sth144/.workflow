<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd08a"/>
      <stop offset="1" stop-color="#3fa45f"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.5" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0c3a1c" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect x="46" y="46" width="420" height="420" rx="96" fill="url(#bg)"/>
  <rect x="46" y="46" width="420" height="420" rx="96" fill="url(#gloss)"/>
  <g filter="url(#sh)">
    <!-- calculator body -->
    <rect x="150" y="138" width="212" height="236" rx="28" fill="#ffffff"/>
    <!-- display -->
    <rect x="172" y="160" width="168" height="44" rx="12" fill="#2f8a4d"/>
    <rect x="246" y="174" width="78" height="16" rx="8" fill="#bdf0cd"/>
    <!-- buttons 3x3 -->
    <g fill="#3fa45f">
      <circle cx="186" cy="248" r="15"/><circle cx="256" cy="248" r="15"/><circle cx="326" cy="248" r="15"/>
      <circle cx="186" cy="304" r="15"/><circle cx="256" cy="304" r="15"/><circle cx="326" cy="304" r="15"/>
    </g>
    <!-- equals row accent -->
    <rect x="171" y="345" width="155" height="14" rx="7" fill="#cdeed6"/>
    <circle cx="326" cy="352" r="15" fill="#e0a23f"/>
  </g>
</svg>
