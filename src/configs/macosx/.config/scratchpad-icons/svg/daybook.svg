<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6cb4f2"/>
      <stop offset="1" stop-color="#3a82d8"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.5" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0d325e" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect x="46" y="46" width="420" height="420" rx="96" fill="url(#bg)"/>
  <rect x="46" y="46" width="420" height="420" rx="96" fill="url(#gloss)"/>
  <g filter="url(#sh)">
    <!-- open book: two pages meeting at a center spine -->
    <path d="M256 168 C228 150 184 146 150 156 L150 340 C184 330 228 334 256 352 Z" fill="#ffffff"/>
    <path d="M256 168 C284 150 328 146 362 156 L362 340 C328 330 284 334 256 352 Z" fill="#ffffff" fill-opacity="0.9"/>
