    <rect x="252" y="166" width="8" height="188" rx="4" fill="#2f6fc0"/>
    <!-- text lines -->
    <g fill="#3a82d8" fill-opacity="0.55">
      <rect x="172" y="192" width="68" height="10" rx="5"/>
      <rect x="172" y="218" width="68" height="10" rx="5"/>
      <rect x="172" y="244" width="52" height="10" rx="5"/>
      <rect x="272" y="192" width="68" height="10" rx="5"/>
      <rect x="272" y="218" width="68" height="10" rx="5"/>
      <rect x="272" y="244" width="52" height="10" rx="5"/>
    </g>
    <!-- ribbon bookmark -->
    <path d="M306 146 l0 86 l-18 -16 l-18 16 l0 -86 z" fill="#ffd23f" stroke="#3a82d8" stroke-width="4" stroke-linejoin="round"/>
  </g>
