BACKUP_NAME="local-ubuntu-pc"
BACKUP_HOSTNAME="$(hostname)"
BACKUP_OWNER="sthinds"
BACKUP_GROUP="sthinds"
BACKUP_HOME="/home/sthinds"

LOCAL_MOUNTPOINT="/mnt/D"
REMOTE_MOUNTPOINT="/media/omv"
LOCAL_BACKUP_ROOT="/mnt/D/Archives/Backups/local-ubuntu-pc"
REMOTE_BACKUP_ROOT="/media/omv/Volumes/Backups/local-ubuntu-pc"

# Keep the job strict: a healthy backup means both the local archive root on D and the
# mirrored copy on the O drive were updated successfully.
REQUIRE_REMOTE_MIRROR="true"

# These thresholds are a guardrail for cron. If free space drops below them, the job
# fails before writing partial snapshots.
LOCAL_MIN_FREE_GB=20
REMOTE_MIN_FREE_GB=50

# Retain all recent snapshots daily, then one per week, then one per month.
KEEP_DAILY_DAYS=14
KEEP_WEEKLY_WEEKS=8
KEEP_MONTHLY_MONTHS=6

# Keep this explicit. These are the home paths the backup is expected to restore.
HOME_INCLUDE_PATHS=(
    "/home/sthinds/.bash_profile"
    "/home/sthinds/.bashrc"
    "/home/sthinds/.profile"
    "/home/sthinds/.ssh"
    "/home/sthinds/.gnupg"
    "/home/sthinds/.config"
    "/home/sthinds/.local/share"
    "/home/sthinds/bin"
    "/home/sthinds/Coding"
    "/home/sthinds/Documents"
)

# Exclude cache-like or obviously disposable content when building the home archive.
HOME_EXCLUDE_PATTERNS=(
    ".cache/"
    ".local/share/Trash/"
    ".local/share/containers/"
    ".mozilla/firefox/*/cache2/"
    "Downloads/"
    "tmp/"
)

# System state worth restoring on this host. Keep these focused and review them whenever
# host-level services are added.
ETC_INCLUDE_PATHS=(
    "/etc/fstab"
    "/etc/hosts"
    "/etc/hostname"
    "/etc/crontab"
    "/etc/cron.d"
    "/etc/systemd/system"
    "/etc/default"
    "/etc/NetworkManager"
    "/etc/samba"
)
